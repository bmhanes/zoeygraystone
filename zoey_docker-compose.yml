services:

  # ── Zoey Core (FastAPI Backend) ──────────────────────────────────────────────
  zoeycore:
    container_name: zoeycore
    build: ./zoeycore
    restart: always
    env_file: .env
    environment:
      - TZ=America/Chicago
      - MONGO_URI=mongodb://zoeydb:27017/zoey
      - OLLAMA_URL=http://ollama:11434
    ports:
      - "8000:8000"
    volumes:
      - ./zoeycore:/zoey/app
      - ./pwa:/zoey/pwa
      - ./logs:/zoey/logs
      - ./backups:/zoey/backups
    depends_on:
      zoeydb:
        condition: service_healthy
    networks:
      - zoeynet

  # ── ZoeyDB (MongoDB) ─────────────────────────────────────────────────────────
  zoeydb:
    container_name: zoeydb
    image: mongo:4.4
    restart: always
    environment:
      - TZ=America/Chicago
    ports:
      - "27017:27017"
    volumes:
      - ./data/mongo:/data/db
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - zoeynet

  # ── Mongo Express (DB Admin UI) ───────────────────────────────────────────────
  mongo-express:
    container_name: zoeydb-ui
    image: mongo-express:latest
    restart: always
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=zoeydb
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=${MONGO_EXPRESS_PASSWORD}
    depends_on:
      zoeydb:
        condition: service_healthy
    networks:
      - zoeynet

  # ── Ollama (Local Mixtral) ────────────────────────────────────────────────────
  ollama:
    container_name: ollama
    image: ollama/ollama:latest
    restart: always
    environment:
      - TZ=America/Chicago
    ports:
      - "11434:11434"
    volumes:
      - ./data/ollama:/root/.ollama
    networks:
      - zoeynet

networks:
  zoeynet:
    driver: bridge
